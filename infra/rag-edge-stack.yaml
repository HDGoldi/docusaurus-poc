AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Edge resources for RAG chat API — CloudFront proxy with WAF rate limiting
  and CORS response headers policy.

  DEPLOY THIS STACK IN us-east-1 (required for CloudFront + WAF CLOUDFRONT scope)

Parameters:
  ChatFunctionUrl:
    Type: String
    Description: >-
      Lambda Function URL from the rag-stack (eu-central-1).
      Example: https://abc123.lambda-url.eu-central-1.on.aws/

Resources:
  # ---------------------------------------------------------------------------
  # CloudFront Response Headers Policy (CORS for chat API)
  # ---------------------------------------------------------------------------

  ChatApiResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-chat-cors"
        CorsConfig:
          AccessControlAllowOrigins:
            Items:
              - "https://help.1nce.com"
              - "https://help.1nce.ai"
              - "https://hdgoldi.github.io"
              - "http://localhost:3000"
          AccessControlAllowMethods:
            Items:
              - POST
              - OPTIONS
          AccessControlAllowHeaders:
            Items:
              - Content-Type
          AccessControlMaxAgeSec: 86400
          AccessControlAllowCredentials: false
          OriginOverride: true

  # ---------------------------------------------------------------------------
  # CloudFront Distribution (proxy for Lambda Function URL)
  # ---------------------------------------------------------------------------

  ChatApiDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: "RAG chat API proxy with WAF rate limiting"
        WebACLId: !GetAtt ChatWafWebAcl.Arn
        Origins:
          - Id: LambdaOrigin
            DomainName: !Select [2, !Split ["/", !Ref ChatFunctionUrl]]
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          ResponseHeadersPolicyId: !Ref ChatApiResponseHeadersPolicy
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - PATCH
            - POST
            - DELETE
        HttpVersion: http2and3
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  # ---------------------------------------------------------------------------
  # WAF WebACL — rate limiting per D-11, D-12
  # ---------------------------------------------------------------------------

  ChatWafWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${AWS::StackName}-chat-waf"
      Description: "Rate limiting for RAG chat API - 100 req/5min per IP"
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      Rules:
        - Name: RateLimitPerIP
          Priority: 1
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 100
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: ChatRateLimit
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: ChatWafWebAcl
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

# =============================================================================
# Outputs
# =============================================================================

Outputs:
  ChatApiDistributionDomain:
    Value: !GetAtt ChatApiDistribution.DomainName
    Description: CloudFront domain for WAF-protected chat API

  ChatApiDistributionId:
    Value: !Ref ChatApiDistribution
    Description: CloudFront distribution ID for chat API
