AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  AWS infrastructure for 1NCE Developer Hub (help.1nce.com) -
  S3, CloudFront, ACM, Route 53, IAM OIDC

Parameters:
  DomainName:
    Type: String
    Default: help.1nce.ai
    Description: Custom domain for the production site

  HostedZoneId:
    Type: String
    Description: Route 53 hosted zone ID for the domain

  GitHubOrg:
    Type: String
    Description: GitHub organization name for OIDC trust policy

  GitHubRepo:
    Type: String
    Description: GitHub repository name for OIDC trust policy

Resources:
  # ---------------------------------------------------------------------------
  # S3 Buckets
  # ---------------------------------------------------------------------------

  ProdBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: 1nce-developer-hub-prod
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  PreviewBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: 1nce-developer-hub-preview
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpirePreviewObjects
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  # ---------------------------------------------------------------------------
  # CloudFront Origin Access Control
  # ---------------------------------------------------------------------------

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ---------------------------------------------------------------------------
  # CloudFront Function (SPA routing)
  # ---------------------------------------------------------------------------

  SpaRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-spa-rewrite"
      AutoPublish: true
      FunctionConfig:
        Runtime: cloudfront-js-2.0
        Comment: "SPA routing rewrite for Docusaurus"
      FunctionCode: |
        async function handler(event) {
            var request = event.request;
            var uri = request.uri;
            if (uri.endsWith('/')) {
                request.uri += 'index.html';
            } else if (!uri.includes('.')) {
                request.uri += '/index.html';
            }
            return request;
        }

  # ---------------------------------------------------------------------------
  # ACM Certificate (must be in us-east-1 for CloudFront)
  # ---------------------------------------------------------------------------

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  # ---------------------------------------------------------------------------
  # CloudFront Distributions
  # ---------------------------------------------------------------------------

  ProdDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases:
          - !Ref DomainName
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt ProdBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRewriteFunction.FunctionMetadata.FunctionARN
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        DefaultRootObject: index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 300
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 300
        HttpVersion: http2and3
        IPV6Enabled: true
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  PreviewDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt PreviewBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRewriteFunction.FunctionMetadata.FunctionARN
        DefaultRootObject: index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 300
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 300
        HttpVersion: http2and3
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  # ---------------------------------------------------------------------------
  # S3 Bucket Policies (separate resources to avoid circular dependencies)
  # ---------------------------------------------------------------------------

  ProdBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ProdBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${ProdBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${ProdDistribution}"

  PreviewBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PreviewBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${PreviewBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${PreviewDistribution}"

  # ---------------------------------------------------------------------------
  # Route 53 DNS Records
  # ---------------------------------------------------------------------------

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ProdDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  DnsRecordIPv6:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt ProdDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  # ---------------------------------------------------------------------------
  # GitHub Actions OIDC Provider and IAM Role
  # ---------------------------------------------------------------------------

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: DeployToS3AndInvalidateCloudFront
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3Deploy
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetObject
                Resource:
                  - !GetAtt ProdBucket.Arn
                  - !Sub "${ProdBucket.Arn}/*"
                  - !GetAtt PreviewBucket.Arn
                  - !Sub "${PreviewBucket.Arn}/*"
              - Sid: CloudFrontInvalidation
                Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource:
                  - !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${ProdDistribution}"
                  - !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${PreviewDistribution}"
        - PolicyName: RagStackDeployment
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:ListStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                Resource:
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/1nce-devhub-rag/*"
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/nce-devhub-rag/*"
                  - !Sub "arn:aws:cloudformation:eu-central-1:${AWS::AccountId}:stack/nce-devhub-rag/*"
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/nce-devhub-rag-edge/*"
              - Sid: RagS3Bucket
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketVersioning
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketTagging
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:GetBucketLocation
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - "arn:aws:s3:::nce-devhub-rag-*"
                  - "arn:aws:s3:::nce-devhub-rag-*/*"
                  - "arn:aws:s3:::1nce-devhub-lambda-deployments-eu"
                  - "arn:aws:s3:::1nce-devhub-lambda-deployments-eu/*"
              - Sid: LambdaCodeBucket
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::*/*"
              - Sid: IAMForRagStack
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:PassRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/nce-devhub-rag-*"
              - Sid: Lambda
                Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:TagResource
                  - lambda:CreateFunctionUrlConfig
                  - lambda:UpdateFunctionUrlConfig
                  - lambda:DeleteFunctionUrlConfig
                  - lambda:GetFunctionUrlConfig
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:nce-devhub-rag-*"
                  - !Sub "arn:aws:lambda:eu-central-1:${AWS::AccountId}:function:nce-devhub-rag-*"
              - Sid: Bedrock
                Effect: Allow
                Action:
                  - bedrock:CreateKnowledgeBase
                  - bedrock:UpdateKnowledgeBase
                  - bedrock:DeleteKnowledgeBase
                  - bedrock:GetKnowledgeBase
                  - bedrock:ListKnowledgeBases
                  - bedrock:CreateDataSource
                  - bedrock:UpdateDataSource
                  - bedrock:DeleteDataSource
                  - bedrock:GetDataSource
                  - bedrock:ListDataSources
                  - bedrock:TagResource
                  - bedrock:UntagResource
                  - bedrock:ListTagsForResource
                  - bedrock:StartIngestionJob
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*"
                  - !Sub "arn:aws:bedrock:eu-central-1:${AWS::AccountId}:knowledge-base/*"
              - Sid: CloudFrontRag
                Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:DeleteDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:TagResource
                  - cloudfront:CreateResponseHeadersPolicy
                  - cloudfront:UpdateResponseHeadersPolicy
                  - cloudfront:DeleteResponseHeadersPolicy
                  - cloudfront:GetResponseHeadersPolicy
                Resource: "*"
              - Sid: WAF
                Effect: Allow
                Action:
                  - wafv2:CreateWebACL
                  - wafv2:UpdateWebACL
                  - wafv2:DeleteWebACL
                  - wafv2:GetWebACL
                  - wafv2:TagResource
                  - wafv2:ListTagsForResource
                Resource:
                  - !Sub "arn:aws:wafv2:${AWS::Region}:${AWS::AccountId}:global/webacl/*"
              - Sid: S3Vectors
                Effect: Allow
                Action:
                  - s3vectors:CreateVectorBucket
                  - s3vectors:GetVectorBucket
                  - s3vectors:ListVectorBuckets
                  - s3vectors:CreateIndex
                  - s3vectors:GetIndex
                  - s3vectors:ListIndexes
                Resource: "*"
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

Outputs:
  ProdDistributionId:
    Value: !Ref ProdDistribution
    Description: Production CloudFront distribution ID

  ProdDistributionDomain:
    Value: !GetAtt ProdDistribution.DomainName
    Description: Production CloudFront distribution domain name

  PreviewDistributionId:
    Value: !Ref PreviewDistribution
    Description: Preview CloudFront distribution ID

  PreviewDistributionDomain:
    Value: !GetAtt PreviewDistribution.DomainName
    Description: Preview CloudFront distribution domain name

  GitHubActionsRoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
    Description: IAM role ARN for GitHub Actions OIDC authentication

  ProdBucketName:
    Value: !Ref ProdBucket
    Description: Production S3 bucket name

  PreviewBucketName:
    Value: !Ref PreviewBucket
    Description: Preview S3 bucket name
