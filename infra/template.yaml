AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  AWS infrastructure for 1NCE Developer Hub (help.1nce.com) -
  S3, CloudFront, ACM, Route 53, IAM OIDC

Parameters:
  DomainName:
    Type: String
    Default: help.1nce.com
    Description: Custom domain for the production site

  HostedZoneId:
    Type: String
    Description: Route 53 hosted zone ID for the domain

  GitHubOrg:
    Type: String
    Description: GitHub organization name for OIDC trust policy

  GitHubRepo:
    Type: String
    Description: GitHub repository name for OIDC trust policy

Resources:
  # ---------------------------------------------------------------------------
  # S3 Buckets
  # ---------------------------------------------------------------------------

  ProdBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: 1nce-developer-hub-prod
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  PreviewBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: 1nce-developer-hub-preview
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpirePreviewObjects
            Status: Enabled
            ExpirationInDays: 30

  # ---------------------------------------------------------------------------
  # CloudFront Origin Access Control
  # ---------------------------------------------------------------------------

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ---------------------------------------------------------------------------
  # CloudFront Function (SPA routing)
  # ---------------------------------------------------------------------------

  SpaRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-spa-rewrite"
      AutoPublish: true
      FunctionConfig:
        Runtime: cloudfront-js-2.0
        Comment: "SPA routing rewrite for Docusaurus"
      FunctionCode: |
        async function handler(event) {
            var request = event.request;
            var uri = request.uri;
            if (uri.endsWith('/')) {
                request.uri += 'index.html';
            } else if (!uri.includes('.')) {
                request.uri += '/index.html';
            }
            return request;
        }

  # ---------------------------------------------------------------------------
  # ACM Certificate (must be in us-east-1 for CloudFront)
  # ---------------------------------------------------------------------------

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  # ---------------------------------------------------------------------------
  # CloudFront Distributions
  # ---------------------------------------------------------------------------

  ProdDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases:
          - !Ref DomainName
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt ProdBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRewriteFunction.FunctionMetadata.FunctionARN
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        DefaultRootObject: index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 300
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 300
        HttpVersion: http2and3
        IPV6Enabled: true

  PreviewDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt PreviewBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRewriteFunction.FunctionMetadata.FunctionARN
        DefaultRootObject: index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 300
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 300
        HttpVersion: http2and3

  # ---------------------------------------------------------------------------
  # S3 Bucket Policies (separate resources to avoid circular dependencies)
  # ---------------------------------------------------------------------------

  ProdBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ProdBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${ProdBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${ProdDistribution}"

  PreviewBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PreviewBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${PreviewBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${PreviewDistribution}"

  # ---------------------------------------------------------------------------
  # Route 53 DNS Records
  # ---------------------------------------------------------------------------

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ProdDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  DnsRecordIPv6:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt ProdDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  # ---------------------------------------------------------------------------
  # GitHub Actions OIDC Provider and IAM Role
  # ---------------------------------------------------------------------------

  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOidcProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: DeployToS3AndInvalidateCloudFront
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3Deploy
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetObject
                Resource:
                  - !GetAtt ProdBucket.Arn
                  - !Sub "${ProdBucket.Arn}/*"
                  - !GetAtt PreviewBucket.Arn
                  - !Sub "${PreviewBucket.Arn}/*"
              - Sid: CloudFrontInvalidation
                Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource:
                  - !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${ProdDistribution}"
                  - !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${PreviewDistribution}"

Outputs:
  ProdDistributionId:
    Value: !Ref ProdDistribution
    Description: Production CloudFront distribution ID

  ProdDistributionDomain:
    Value: !GetAtt ProdDistribution.DomainName
    Description: Production CloudFront distribution domain name

  PreviewDistributionId:
    Value: !Ref PreviewDistribution
    Description: Preview CloudFront distribution ID

  PreviewDistributionDomain:
    Value: !GetAtt PreviewDistribution.DomainName
    Description: Preview CloudFront distribution domain name

  GitHubActionsRoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
    Description: IAM role ARN for GitHub Actions OIDC authentication

  ProdBucketName:
    Value: !Ref ProdBucket
    Description: Production S3 bucket name

  PreviewBucketName:
    Value: !Ref PreviewBucket
    Description: Preview S3 bucket name
