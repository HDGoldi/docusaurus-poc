AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  RAG chat backend for 1NCE Developer Hub — Bedrock Knowledge Base with S3 Vectors,
  streaming Lambda Function URL.

  DEPLOY THIS STACK IN eu-central-1

Parameters:
  RagContentBucketName:
    Type: String
    Default: 1nce-devhub-rag-content
    Description: S3 bucket for pre-chunked RAG content files

  LambdaCodeBucketName:
    Type: String
    Default: 1nce-devhub-lambda-deployments
    Description: S3 bucket holding the Lambda deployment zip (must exist in eu-central-1)

  LambdaCodeKey:
    Type: String
    Default: chat-handler.zip
    Description: S3 key for the Lambda deployment zip

  AllowedOrigins:
    Type: CommaDelimitedList
    Default: "https://help.1nce.com,https://help.1nce.ai,https://hdgoldi.github.io,http://localhost:3000"
    Description: Origins allowed for CORS on the Lambda Function URL

  VectorBucketArn:
    Type: String
    Description: >-
      ARN of the S3 Vector Bucket for storing embeddings. Must be pre-created
      because CloudFormation does not yet support AWS::S3::VectorBucket.
      Create it via CLI: aws s3vectors create-vector-bucket --vector-bucket-name 1nce-devhub-vectors
      Then pass the ARN from the output here.

  ModelId:
    Type: String
    Default: "anthropic.claude-3-haiku-20240307-v1:0"
    Description: >-
      Bedrock foundation model ID for generation. The full ARN is built
      automatically using the deployment region.

Resources:

  # ---------------------------------------------------------------------------
  # S3 Bucket for RAG Content (pre-chunked docs + metadata)
  # ---------------------------------------------------------------------------

  RagContentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref RagContentBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  # ---------------------------------------------------------------------------
  # IAM Role for Bedrock Knowledge Base
  # ---------------------------------------------------------------------------

  BedrockKBRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-bedrock-kb-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockKBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3Access
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt RagContentBucket.Arn
                  - !Sub "${RagContentBucket.Arn}/*"
              - Sid: EmbeddingModel
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
              - Sid: S3VectorsAccess
                Effect: Allow
                Action:
                  - s3vectors:CreateIndex
                  - s3vectors:PutVectors
                  - s3vectors:GetVectors
                  - s3vectors:DeleteVectors
                  - s3vectors:QueryVectors
                  - s3vectors:ListIndexes
                Resource:
                  - !Ref VectorBucketArn
                  - !Sub "${VectorBucketArn}/*"
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  # ---------------------------------------------------------------------------
  # Bedrock Knowledge Base with S3 Vectors (D-06, D-07)
  # ---------------------------------------------------------------------------

  KnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    Properties:
      Name: 1nce-devhub-docs-kb
      Description: 1NCE Developer Hub documentation knowledge base for RAG chat
      RoleArn: !GetAtt BedrockKBRole.Arn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
      StorageConfiguration:
        Type: S3_VECTORS
        S3VectorsConfiguration:
          VectorBucketArn: !Ref VectorBucketArn
          IndexName: devhub-docs-vector-index
      Tags:
        environment: dev
        component: ai

  # ---------------------------------------------------------------------------
  # Bedrock Data Source — S3 with no re-chunking (D-07)
  # ---------------------------------------------------------------------------

  KnowledgeBaseDataSource:
    Type: AWS::Bedrock::DataSource
    Properties:
      KnowledgeBaseId: !GetAtt KnowledgeBase.KnowledgeBaseId
      Name: devhub-docs-source
      Description: Pre-chunked documentation and API endpoint content
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          BucketArn: !GetAtt RagContentBucket.Arn
          InclusionPrefixes:
            - "chunks/"
      VectorIngestionConfiguration:
        ChunkingConfiguration:
          ChunkingStrategy: NONE
      DataDeletionPolicy: RETAIN

  # ---------------------------------------------------------------------------
  # IAM Role for Lambda Function
  # ---------------------------------------------------------------------------

  ChatFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-chat-function-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: RetrieveAndGenerate
                Effect: Allow
                Action:
                  - bedrock:RetrieveAndGenerate
                  - bedrock:Retrieve
                Resource:
                  - !GetAtt KnowledgeBase.KnowledgeBaseArn
              - Sid: InvokeModel
                Effect: Allow
                Action:
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${ModelId}"
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  # ---------------------------------------------------------------------------
  # Lambda Function — streaming chat handler
  # ---------------------------------------------------------------------------

  ChatFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: 1nce-devhub-chat
      Description: RAG chat handler — streams answers from Bedrock KB via SSE
      Runtime: nodejs20.x
      Handler: index.handler
      Code:
        S3Bucket: !Ref LambdaCodeBucketName
        S3Key: !Ref LambdaCodeKey
      MemorySize: 256
      Timeout: 30
      Role: !GetAtt ChatFunctionRole.Arn
      Environment:
        Variables:
          KB_ID: !GetAtt KnowledgeBase.KnowledgeBaseId
          MODEL_ARN: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${ModelId}"
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  # ---------------------------------------------------------------------------
  # Lambda Function URL — RESPONSE_STREAM for SSE (D-08)
  # ---------------------------------------------------------------------------

  ChatFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !GetAtt ChatFunction.Arn
      AuthType: NONE
      InvokeMode: RESPONSE_STREAM
      Cors:
        AllowOrigins: !Ref AllowedOrigins
        AllowMethods:
          - POST
        AllowHeaders:
          - Content-Type
        MaxAge: 86400

  ChatFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ChatFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

# =============================================================================
# Outputs
# =============================================================================

Outputs:
  KnowledgeBaseId:
    Value: !GetAtt KnowledgeBase.KnowledgeBaseId
    Description: Bedrock Knowledge Base ID

  DataSourceId:
    Value: !GetAtt KnowledgeBaseDataSource.DataSourceId
    Description: Bedrock Data Source ID for ingestion jobs

  KnowledgeBaseArn:
    Value: !GetAtt KnowledgeBase.KnowledgeBaseArn
    Description: Bedrock Knowledge Base ARN

  ChatFunctionArn:
    Value: !GetAtt ChatFunction.Arn
    Description: Chat Lambda function ARN

  ChatFunctionUrl:
    Value: !GetAtt ChatFunctionUrl.FunctionUrl
    Description: Lambda Function URL for direct access (bypasses WAF)

  RagContentBucketName:
    Value: !Ref RagContentBucket
    Description: S3 bucket name for RAG content

  RagContentBucketArn:
    Value: !GetAtt RagContentBucket.Arn
    Description: S3 bucket ARN for RAG content
