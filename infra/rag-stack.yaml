AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  RAG chat backend for 1NCE Developer Hub — Bedrock Knowledge Base with S3 Vectors,
  streaming Lambda Function URL, and CloudFront proxy with WAF rate limiting.

  DEPLOYMENT REGIONS:
  - Main resources (Bedrock KB, Lambda, Function URL): Deploy in eu-central-1
  - Edge resources (CloudFront, WAF, CORS headers policy): Deploy in us-east-1
    These are in a separate section at the bottom, clearly marked.
    They can be added to infra/template.yaml or deployed as a separate stack.

# =============================================================================
# DEPLOY THIS STACK IN eu-central-1
# =============================================================================

Parameters:
  RagContentBucketName:
    Type: String
    Default: 1nce-devhub-rag-content
    Description: S3 bucket for pre-chunked RAG content files

  LambdaCodeBucketName:
    Type: String
    Description: S3 bucket holding the Lambda deployment zip (must exist in eu-central-1)

  LambdaCodeKey:
    Type: String
    Default: chat-handler.zip
    Description: S3 key for the Lambda deployment zip

  AllowedOrigins:
    Type: CommaDelimitedList
    Default: "https://help.1nce.com,https://hdgoldi.github.io,http://localhost:3000"
    Description: Origins allowed for CORS on the Lambda Function URL

  ModelArn:
    Type: String
    Default: "arn:aws:bedrock:eu-central-1::foundation-model/anthropic.claude-3-haiku-20240307-v1:0"
    Description: >-
      Bedrock model ARN for generation. Default is Claude 3 Haiku (confirmed
      available in eu-central-1). Update to Claude Haiku 4.5 when available.

Resources:
  # ---------------------------------------------------------------------------
  # S3 Bucket for RAG Content (pre-chunked docs + metadata)
  # ---------------------------------------------------------------------------

  RagContentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref RagContentBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  # ---------------------------------------------------------------------------
  # IAM Role for Bedrock Knowledge Base
  # ---------------------------------------------------------------------------

  BedrockKBRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-bedrock-kb-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockKBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3Access
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt RagContentBucket.Arn
                  - !Sub "${RagContentBucket.Arn}/*"
              - Sid: EmbeddingModel
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - "arn:aws:bedrock:eu-central-1::foundation-model/amazon.titan-embed-text-v2:0"
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  # ---------------------------------------------------------------------------
  # Bedrock Knowledge Base with S3 Vectors (D-06, D-07)
  # ---------------------------------------------------------------------------

  KnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    Properties:
      Name: 1nce-devhub-docs-kb
      Description: 1NCE Developer Hub documentation knowledge base for RAG chat
      RoleArn: !GetAtt BedrockKBRole.Arn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: "arn:aws:bedrock:eu-central-1::foundation-model/amazon.titan-embed-text-v2:0"
      StorageConfiguration:
        Type: S3_VECTORS
        S3VectorsConfiguration:
          BucketArn: !GetAtt RagContentBucket.Arn
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  # ---------------------------------------------------------------------------
  # Bedrock Data Source — S3 with no re-chunking (D-07)
  # ---------------------------------------------------------------------------

  KnowledgeBaseDataSource:
    Type: AWS::Bedrock::DataSource
    Properties:
      KnowledgeBaseId: !GetAtt KnowledgeBase.KnowledgeBaseId
      Name: devhub-docs-source
      Description: Pre-chunked documentation and API endpoint content
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          BucketArn: !GetAtt RagContentBucket.Arn
          InclusionPrefixes:
            - "chunks/"
      VectorIngestionConfiguration:
        ChunkingConfiguration:
          ChunkingStrategy: NONE
      DataDeletionPolicy: RETAIN

  # ---------------------------------------------------------------------------
  # IAM Role for Lambda Function
  # ---------------------------------------------------------------------------

  ChatFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-chat-function-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: RetrieveAndGenerate
                Effect: Allow
                Action:
                  - bedrock:RetrieveAndGenerate
                  - bedrock:Retrieve
                Resource:
                  - !GetAtt KnowledgeBase.KnowledgeBaseArn
              - Sid: InvokeModel
                Effect: Allow
                Action:
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:InvokeModel
                Resource:
                  - !Ref ModelArn
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  # ---------------------------------------------------------------------------
  # Lambda Function — streaming chat handler
  # ---------------------------------------------------------------------------

  ChatFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: 1nce-devhub-chat
      Description: RAG chat handler — streams answers from Bedrock KB via SSE
      Runtime: nodejs20.x
      Handler: index.handler
      Code:
        S3Bucket: !Ref LambdaCodeBucketName
        S3Key: !Ref LambdaCodeKey
      MemorySize: 256
      Timeout: 30
      Role: !GetAtt ChatFunctionRole.Arn
      Environment:
        Variables:
          KB_ID: !GetAtt KnowledgeBase.KnowledgeBaseId
          MODEL_ARN: !Ref ModelArn
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  # ---------------------------------------------------------------------------
  # Lambda Function URL — RESPONSE_STREAM for SSE (D-08)
  # ---------------------------------------------------------------------------

  ChatFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !GetAtt ChatFunction.Arn
      AuthType: NONE
      InvokeMode: RESPONSE_STREAM
      Cors:
        AllowOrigins: !Ref AllowedOrigins
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
        MaxAge: 86400

  ChatFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ChatFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

# =============================================================================
# EDGE RESOURCES — DEPLOY IN us-east-1
# =============================================================================
# The resources below require us-east-1 deployment because:
# - WAFv2 WebACL with CLOUDFRONT scope must be in us-east-1
# - CloudFront distributions are global but managed from us-east-1
#
# Option A: Add these to infra/template.yaml (already deployed in us-east-1)
# Option B: Deploy as a separate stack in us-east-1
#
# The ChatFunctionUrl output from the eu-central-1 stack must be passed
# as a parameter to the us-east-1 stack for the CloudFront origin.
# =============================================================================

  # ---------------------------------------------------------------------------
  # CloudFront Response Headers Policy (CORS for chat API)
  # ---------------------------------------------------------------------------

  ChatApiResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-chat-cors"
        CorsConfig:
          AccessControlAllowOrigins:
            Items:
              - "https://help.1nce.com"
              - "https://hdgoldi.github.io"
              - "http://localhost:3000"
          AccessControlAllowMethods:
            Items:
              - POST
              - OPTIONS
          AccessControlAllowHeaders:
            Items:
              - Content-Type
          AccessControlMaxAgeSec: 86400
          AccessControlAllowCredentials: false
          OriginOverride: true

  # ---------------------------------------------------------------------------
  # CloudFront Distribution (proxy for Lambda Function URL)
  # ---------------------------------------------------------------------------

  ChatApiDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: "RAG chat API proxy with WAF rate limiting"
        WebACLId: !GetAtt ChatWafWebAcl.Arn
        Origins:
          - Id: LambdaOrigin
            DomainName: !Select [2, !Split ["/", !GetAtt ChatFunctionUrl.FunctionUrl]]
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          ResponseHeadersPolicyId: !Ref ChatApiResponseHeadersPolicy
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - PATCH
            - POST
            - DELETE
        HttpVersion: http2and3
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

  # ---------------------------------------------------------------------------
  # WAF WebACL — rate limiting per D-11, D-12
  # ---------------------------------------------------------------------------

  ChatWafWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${AWS::StackName}-chat-waf"
      Description: "Rate limiting for RAG chat API — 10 req/min per IP"
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      Rules:
        - Name: RateLimitPerIP
          Priority: 1
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 10
              EvaluateWindowSec: 60
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: ChatRateLimit
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: ChatWafWebAcl
      Tags:
        - Key: environment
          Value: dev
        - Key: component
          Value: ai

# =============================================================================
# Outputs
# =============================================================================

Outputs:
  KnowledgeBaseId:
    Value: !GetAtt KnowledgeBase.KnowledgeBaseId
    Description: Bedrock Knowledge Base ID

  DataSourceId:
    Value: !GetAtt KnowledgeBaseDataSource.DataSourceId
    Description: Bedrock Data Source ID for ingestion jobs

  KnowledgeBaseArn:
    Value: !GetAtt KnowledgeBase.KnowledgeBaseArn
    Description: Bedrock Knowledge Base ARN

  ChatFunctionArn:
    Value: !GetAtt ChatFunction.Arn
    Description: Chat Lambda function ARN

  ChatFunctionUrl:
    Value: !GetAtt ChatFunctionUrl.FunctionUrl
    Description: Lambda Function URL for direct access (bypasses WAF)

  RagContentBucketName:
    Value: !Ref RagContentBucket
    Description: S3 bucket name for RAG content

  RagContentBucketArn:
    Value: !GetAtt RagContentBucket.Arn
    Description: S3 bucket ARN for RAG content

  ChatApiDistributionDomain:
    Value: !GetAtt ChatApiDistribution.DomainName
    Description: CloudFront domain for WAF-protected chat API

  ChatApiDistributionId:
    Value: !Ref ChatApiDistribution
    Description: CloudFront distribution ID for chat API
