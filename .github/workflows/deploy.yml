name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm rebuild

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 1

      - uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: ./lighthouserc.json

  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to preview S3
        run: aws s3 sync build/ s3://1nce-developer-hub-preview/pr-${{ github.event.number }}/ --delete

      - name: Fix content-type for Markdown files
        run: |
          aws s3 cp s3://1nce-developer-hub-preview/pr-${{ github.event.number }}/ s3://1nce-developer-hub-preview/pr-${{ github.event.number }}/ \
            --recursive \
            --exclude "*" \
            --include "*.md" \
            --content-type "text/markdown; charset=utf-8" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=600, must-revalidate"

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed: https://${{ vars.PREVIEW_CF_DISTRIBUTION_DOMAIN }}/pr-${{ github.event.number }}/`
            })

  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # One-time migration: remove the old single-region stack that mixed
      # eu-central-1 resources (Lambda/Bedrock) with us-east-1 resources
      # (CloudFront/WAF) in one template.  Retain the S3 bucket so RAG
      # content is not lost.  This step is idempotent — it silently
      # succeeds once the old stack no longer exists.
      - name: Delete legacy RAG stack in us-east-1 (one-time migration)
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name nce-devhub-rag \
            --region us-east-1 \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$STACK_STATUS" = "NOT_FOUND" ]; then
            echo "No legacy stack in us-east-1 — skipping."
            exit 0
          fi

          if [ "$STACK_STATUS" = "DELETE_IN_PROGRESS" ]; then
            echo "Legacy stack deletion already in progress — waiting…"
            aws cloudformation wait stack-delete-complete \
              --stack-name nce-devhub-rag --region us-east-1 || true
          fi

          # Re-check status after a possible wait
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name nce-devhub-rag \
            --region us-east-1 \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$STACK_STATUS" = "NOT_FOUND" ]; then
            echo "Stack already gone."
            exit 0
          fi

          # If already in DELETE_FAILED, skip straight to retain
          if [ "$STACK_STATUS" = "DELETE_FAILED" ]; then
            echo "Stack in DELETE_FAILED — retrying with --retain-resources…"
            aws cloudformation delete-stack \
              --stack-name nce-devhub-rag \
              --region us-east-1 \
              --retain-resources RagContentBucket
            aws cloudformation wait stack-delete-complete \
              --stack-name nce-devhub-rag --region us-east-1
            echo "Legacy stack deleted (S3 bucket retained)."
            exit 0
          fi

          # Normal delete attempt first
          echo "Legacy stack found (status: $STACK_STATUS) — deleting…"
          aws cloudformation delete-stack \
            --stack-name nce-devhub-rag \
            --region us-east-1

          # Wait — this may fail if the non-empty S3 bucket blocks deletion
          if aws cloudformation wait stack-delete-complete \
            --stack-name nce-devhub-rag --region us-east-1 2>/dev/null; then
            echo "Legacy stack deleted."
            exit 0
          fi

          # Delete failed (likely the S3 bucket) — retry with retain
          echo "Delete failed — retrying with --retain-resources RagContentBucket…"
          aws cloudformation delete-stack \
            --stack-name nce-devhub-rag \
            --region us-east-1 \
            --retain-resources RagContentBucket
          aws cloudformation wait stack-delete-complete \
            --stack-name nce-devhub-rag --region us-east-1
          echo "Legacy stack deleted (S3 bucket retained)."

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      # S3 Vector Buckets are regional — ensure one exists in eu-central-1
      # for the Bedrock Knowledge Base. Idempotent: skips if it already exists.
      - name: Ensure S3 Vector Bucket exists in eu-central-1
        id: vector-bucket
        run: |
          BUCKET_NAME="1nce-devhub-vectors-eu"
          if aws s3vectors get-vector-bucket --vector-bucket-name "$BUCKET_NAME" >/dev/null 2>&1; then
            echo "Vector bucket $BUCKET_NAME already exists."
          else
            echo "Creating vector bucket $BUCKET_NAME in eu-central-1…"
            aws s3vectors create-vector-bucket --vector-bucket-name "$BUCKET_NAME"
          fi
          BUCKET_ARN=$(aws s3vectors get-vector-bucket \
            --vector-bucket-name "$BUCKET_NAME" \
            --query "vectorBucket.vectorBucketArn" --output text)
          echo "vector_bucket_arn=$BUCKET_ARN" >> "$GITHUB_OUTPUT"

          # Ensure the vector index exists inside the bucket.
          # Titan Embed Text v2 produces 1024-dim vectors; cosine is the
          # default distance metric for Bedrock KB.
          INDEX_NAME="devhub-docs-vector-index"
          if aws s3vectors get-index \
            --vector-bucket-name "$BUCKET_NAME" \
            --index-name "$INDEX_NAME" >/dev/null 2>&1; then
            echo "Index $INDEX_NAME already exists."
          else
            echo "Creating index $INDEX_NAME (1024-dim, cosine)…"
            aws s3vectors create-index \
              --vector-bucket-name "$BUCKET_NAME" \
              --index-name "$INDEX_NAME" \
              --dimension 1024 \
              --distance-metric cosine \
              --data-type float32
            echo "Waiting for index to become active…"
            sleep 10
          fi

      # Lambda requires the code bucket to be in the same region as the
      # function.  Copy the deployment zip from us-east-1 to eu-central-1.
      - name: Ensure Lambda code bucket exists in eu-central-1
        run: |
          SRC_BUCKET="1nce-devhub-lambda-deployments"
          DST_BUCKET="1nce-devhub-lambda-deployments-eu"
          CODE_KEY="chat-handler.zip"

          # Create the eu-central-1 bucket if it doesn't exist
          if ! aws s3api head-bucket --bucket "$DST_BUCKET" 2>/dev/null; then
            echo "Creating $DST_BUCKET in eu-central-1…"
            aws s3api create-bucket \
              --bucket "$DST_BUCKET" \
              --create-bucket-configuration LocationConstraint=eu-central-1
          fi

          # Copy the zip from the us-east-1 bucket
          echo "Copying $CODE_KEY from $SRC_BUCKET to $DST_BUCKET…"
          aws s3 cp "s3://$SRC_BUCKET/$CODE_KEY" "/tmp/$CODE_KEY" --region us-east-1
          aws s3 cp "/tmp/$CODE_KEY" "s3://$DST_BUCKET/$CODE_KEY"

      # Recover from broken RAG stack states. Healthy stacks
      # (CREATE_COMPLETE / UPDATE_COMPLETE / UPDATE_ROLLBACK_COMPLETE)
      # are left alone — `cloudformation deploy` will update in place.
      - name: Recover broken RAG stack in eu-central-1 (if needed)
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name nce-devhub-rag \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$STACK_STATUS" = "NOT_FOUND" ]; then
            echo "No existing stack — will create fresh."
            exit 0
          fi

          echo "Stack exists with status: $STACK_STATUS"

          # Healthy states — nothing to do, deploy will update in place
          case "$STACK_STATUS" in
            CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE)
              echo "Stack is healthy — will update in place."
              exit 0
              ;;
          esac

          # Everything else (DELETE_FAILED, CREATE_FAILED, ROLLBACK_COMPLETE,
          # ROLLBACK_FAILED, etc.) — delete the stack so we can recreate.
          # Use --retain-resources for the versioned S3 bucket to avoid the
          # "bucket not empty" blocker, then clean up the bucket separately.
          echo "Stack in bad state ($STACK_STATUS) — deleting with retained bucket…"

          # First attempt: normal delete
          aws cloudformation delete-stack --stack-name nce-devhub-rag
          if ! aws cloudformation wait stack-delete-complete \
            --stack-name nce-devhub-rag 2>/dev/null; then
            echo "Normal delete failed — retrying with --retain-resources RagContentBucket…"
            aws cloudformation delete-stack \
              --stack-name nce-devhub-rag \
              --retain-resources RagContentBucket
            aws cloudformation wait stack-delete-complete --stack-name nce-devhub-rag
          fi

          echo "Stack deleted."

          # Clean up the orphaned bucket if it was retained
          BUCKET=$(aws s3api list-buckets \
            --query "Buckets[?contains(Name,'nce-devhub-rag-ragcontent')].Name" \
            --output text 2>/dev/null || echo "")
          if [ -n "$BUCKET" ] && [ "$BUCKET" != "None" ]; then
            echo "Cleaning up orphaned bucket: $BUCKET"
            aws s3 rm "s3://$BUCKET" --recursive || true
            # Purge all object versions and delete markers
            aws s3api list-object-versions --bucket "$BUCKET" --output json > /tmp/versions.json
            jq -c '[.Versions // [] | .[] | {Key, VersionId}] | select(length > 0) | _nwise(1000) | {Objects: ., Quiet: true}' /tmp/versions.json | \
              while IFS= read -r batch; do
                echo "$batch" > /tmp/delete-batch.json
                aws s3api delete-objects --bucket "$BUCKET" --delete "file:///tmp/delete-batch.json" || true
              done
            jq -c '[.DeleteMarkers // [] | .[] | {Key, VersionId}] | select(length > 0) | _nwise(1000) | {Objects: ., Quiet: true}' /tmp/versions.json | \
              while IFS= read -r batch; do
                echo "$batch" > /tmp/delete-batch.json
                aws s3api delete-objects --bucket "$BUCKET" --delete "file:///tmp/delete-batch.json" || true
              done
            aws s3 rb "s3://$BUCKET" || true
            echo "Orphaned bucket cleaned up."
          fi

      - name: Deploy RAG stack (eu-central-1)
        run: |
          aws cloudformation deploy \
            --template-file infra/rag-stack.yaml \
            --stack-name nce-devhub-rag \
            --parameter-overrides \
              VectorBucketArn=${{ steps.vector-bucket.outputs.vector_bucket_arn }} \
              LambdaCodeBucketName=1nce-devhub-lambda-deployments-eu \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset || {
              echo "=== Changeset failed — fetching details ==="
              # List all changesets and dump the latest one raw
              CHANGESET_ARN=$(aws cloudformation list-change-sets \
                --stack-name nce-devhub-rag \
                --query "Summaries[-1].ChangeSetId" \
                --output text 2>/dev/null || echo "")
              if [ -n "$CHANGESET_ARN" ] && [ "$CHANGESET_ARN" != "None" ]; then
                echo "--- Changeset details ---"
                aws cloudformation describe-change-set \
                  --change-set-name "$CHANGESET_ARN" 2>/dev/null || true
              fi
              echo "--- Stack events (last 20) ---"
              aws cloudformation describe-stack-events \
                --stack-name nce-devhub-rag \
                --max-items 20 \
                --query "StackEvents[].[Timestamp,LogicalResourceId,ResourceStatus,ResourceStatusReason]" \
                --output table 2>/dev/null || true
              echo "--- Checking for orphaned resources ---"
              aws iam get-role --role-name nce-devhub-rag-bedrock-kb-role 2>/dev/null && echo "ORPHAN: nce-devhub-rag-bedrock-kb-role exists" || true
              aws iam get-role --role-name nce-devhub-rag-chat-function-role 2>/dev/null && echo "ORPHAN: nce-devhub-rag-chat-function-role exists" || true
              aws lambda get-function --function-name 1nce-devhub-chat --region eu-central-1 2>/dev/null && echo "ORPHAN: 1nce-devhub-chat Lambda exists in eu-central-1" || true
              aws lambda get-function --function-name nce-devhub-rag-chat --region eu-central-1 2>/dev/null && echo "ORPHAN: nce-devhub-rag-chat Lambda exists in eu-central-1" || true
              aws s3api head-bucket --bucket 1nce-devhub-rag-content 2>/dev/null && echo "ORPHAN: 1nce-devhub-rag-content bucket exists" || true
              exit 1
            }

      - name: Get RAG stack outputs
        id: rag-outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name nce-devhub-rag \
            --query "Stacks[0].Outputs" \
            --output json)
          echo "function_url=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="ChatFunctionUrl") | .OutputValue')" >> "$GITHUB_OUTPUT"
          echo "rag_bucket=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="RagContentBucketName") | .OutputValue')" >> "$GITHUB_OUTPUT"
          echo "kb_id=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="KnowledgeBaseId") | .OutputValue')" >> "$GITHUB_OUTPUT"
          echo "data_source_id=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="DataSourceId") | .OutputValue')" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy RAG edge stack (us-east-1)
        run: |
          aws cloudformation deploy \
            --template-file infra/rag-edge-stack.yaml \
            --stack-name nce-devhub-rag-edge \
            --parameter-overrides \
              ChatFunctionUrl=${{ steps.rag-outputs.outputs.function_url }} \
            --no-fail-on-empty-changeset

      - name: Get edge stack outputs
        id: edge-outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name nce-devhub-rag-edge \
            --query "Stacks[0].Outputs" \
            --output json)
          echo "chat_domain=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="ChatApiDistributionDomain") | .OutputValue')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm rebuild

      - name: Build with CHAT_ENDPOINT
        run: npm run build
        env:
          CHAT_ENDPOINT: https://${{ steps.edge-outputs.outputs.chat_domain }}

      - name: Sync hashed assets with long cache
        run: aws s3 sync build/assets/ s3://1nce-developer-hub-prod/assets/ --cache-control "public, max-age=31536000, immutable"

      - name: Sync remaining files with short cache
        run: aws s3 sync build/ s3://1nce-developer-hub-prod/ --exclude "assets/*" --cache-control "public, max-age=600, must-revalidate" --delete

      - name: Fix content-type for Markdown files
        run: |
          aws s3 cp s3://1nce-developer-hub-prod/ s3://1nce-developer-hub-prod/ \
            --recursive \
            --exclude "*" \
            --include "*.md" \
            --content-type "text/markdown; charset=utf-8" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=600, must-revalidate"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CF_DISTRIBUTION_ID }} --paths "/*"

      - name: Run smoke test
        run: bash scripts/smoke-test.sh https://${{ vars.PROD_CF_DISTRIBUTION_DOMAIN }}

      - name: Prepare RAG content
        run: npx tsx scripts/prepare-rag-content.ts

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Sync RAG content to S3 and start ingestion
        run: npx tsx scripts/sync-rag-to-s3.ts --start-ingestion
        env:
          RAG_CONTENT_BUCKET: ${{ steps.rag-outputs.outputs.rag_bucket }}
          KB_ID: ${{ steps.rag-outputs.outputs.kb_id }}
          DATA_SOURCE_ID: ${{ steps.rag-outputs.outputs.data_source_id }}
