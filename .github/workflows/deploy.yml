name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm rebuild

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 1

      - uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: ./lighthouserc.json

  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to preview S3
        run: aws s3 sync build/ s3://1nce-developer-hub-preview/pr-${{ github.event.number }}/ --delete

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed: https://${{ vars.PREVIEW_CF_DISTRIBUTION_DOMAIN }}/pr-${{ github.event.number }}/`
            })

  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # One-time migration: remove the old single-region stack that mixed
      # eu-central-1 resources (Lambda/Bedrock) with us-east-1 resources
      # (CloudFront/WAF) in one template.  Retain the S3 bucket so RAG
      # content is not lost.  This step is idempotent — it silently
      # succeeds once the old stack no longer exists.
      - name: Delete legacy RAG stack in us-east-1 (one-time migration)
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name nce-devhub-rag \
            --region us-east-1 \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$STACK_STATUS" = "NOT_FOUND" ]; then
            echo "No legacy stack in us-east-1 — skipping."
            exit 0
          fi

          if [ "$STACK_STATUS" = "DELETE_IN_PROGRESS" ]; then
            echo "Legacy stack deletion already in progress — waiting…"
            aws cloudformation wait stack-delete-complete \
              --stack-name nce-devhub-rag --region us-east-1 || true
          fi

          # Re-check status after a possible wait
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name nce-devhub-rag \
            --region us-east-1 \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$STACK_STATUS" = "NOT_FOUND" ]; then
            echo "Stack already gone."
            exit 0
          fi

          # If already in DELETE_FAILED, skip straight to retain
          if [ "$STACK_STATUS" = "DELETE_FAILED" ]; then
            echo "Stack in DELETE_FAILED — retrying with --retain-resources…"
            aws cloudformation delete-stack \
              --stack-name nce-devhub-rag \
              --region us-east-1 \
              --retain-resources RagContentBucket
            aws cloudformation wait stack-delete-complete \
              --stack-name nce-devhub-rag --region us-east-1
            echo "Legacy stack deleted (S3 bucket retained)."
            exit 0
          fi

          # Normal delete attempt first
          echo "Legacy stack found (status: $STACK_STATUS) — deleting…"
          aws cloudformation delete-stack \
            --stack-name nce-devhub-rag \
            --region us-east-1

          # Wait — this may fail if the non-empty S3 bucket blocks deletion
          if aws cloudformation wait stack-delete-complete \
            --stack-name nce-devhub-rag --region us-east-1 2>/dev/null; then
            echo "Legacy stack deleted."
            exit 0
          fi

          # Delete failed (likely the S3 bucket) — retry with retain
          echo "Delete failed — retrying with --retain-resources RagContentBucket…"
          aws cloudformation delete-stack \
            --stack-name nce-devhub-rag \
            --region us-east-1 \
            --retain-resources RagContentBucket
          aws cloudformation wait stack-delete-complete \
            --stack-name nce-devhub-rag --region us-east-1
          echo "Legacy stack deleted (S3 bucket retained)."

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      # S3 Vector Buckets are regional — ensure one exists in eu-central-1
      # for the Bedrock Knowledge Base. Idempotent: skips if it already exists.
      - name: Ensure S3 Vector Bucket exists in eu-central-1
        id: vector-bucket
        run: |
          BUCKET_NAME="1nce-devhub-vectors-eu"
          if aws s3vectors get-vector-bucket --vector-bucket-name "$BUCKET_NAME" >/dev/null 2>&1; then
            echo "Vector bucket $BUCKET_NAME already exists."
          else
            echo "Creating vector bucket $BUCKET_NAME in eu-central-1…"
            aws s3vectors create-vector-bucket --vector-bucket-name "$BUCKET_NAME"
          fi
          BUCKET_ARN=$(aws s3vectors get-vector-bucket \
            --vector-bucket-name "$BUCKET_NAME" \
            --query "vectorBucket.vectorBucketArn" --output text)
          echo "vector_bucket_arn=$BUCKET_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy RAG stack (eu-central-1)
        run: |
          aws cloudformation deploy \
            --template-file infra/rag-stack.yaml \
            --stack-name nce-devhub-rag \
            --parameter-overrides \
              VectorBucketArn=${{ steps.vector-bucket.outputs.vector_bucket_arn }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Get RAG stack outputs
        id: rag-outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name nce-devhub-rag \
            --query "Stacks[0].Outputs" \
            --output json)
          echo "function_url=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="ChatFunctionUrl") | .OutputValue')" >> "$GITHUB_OUTPUT"
          echo "rag_bucket=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="RagContentBucketName") | .OutputValue')" >> "$GITHUB_OUTPUT"
          echo "kb_id=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="KnowledgeBaseId") | .OutputValue')" >> "$GITHUB_OUTPUT"
          echo "data_source_id=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="DataSourceId") | .OutputValue')" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy RAG edge stack (us-east-1)
        run: |
          aws cloudformation deploy \
            --template-file infra/rag-edge-stack.yaml \
            --stack-name nce-devhub-rag-edge \
            --parameter-overrides \
              ChatFunctionUrl=${{ steps.rag-outputs.outputs.function_url }} \
            --no-fail-on-empty-changeset

      - name: Get edge stack outputs
        id: edge-outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name nce-devhub-rag-edge \
            --query "Stacks[0].Outputs" \
            --output json)
          echo "chat_domain=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey=="ChatApiDistributionDomain") | .OutputValue')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm rebuild

      - name: Build with CHAT_ENDPOINT
        run: npm run build
        env:
          CHAT_ENDPOINT: https://${{ steps.edge-outputs.outputs.chat_domain }}

      - name: Sync hashed assets with long cache
        run: aws s3 sync build/assets/ s3://1nce-developer-hub-prod/assets/ --cache-control "public, max-age=31536000, immutable"

      - name: Sync remaining files with short cache
        run: aws s3 sync build/ s3://1nce-developer-hub-prod/ --exclude "assets/*" --cache-control "public, max-age=600, must-revalidate" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CF_DISTRIBUTION_ID }} --paths "/*"

      - name: Run smoke test
        run: bash scripts/smoke-test.sh https://${{ vars.PROD_CF_DISTRIBUTION_DOMAIN }}

      - name: Prepare RAG content
        run: npx tsx scripts/prepare-rag-content.ts

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Sync RAG content to S3 and start ingestion
        run: npx tsx scripts/sync-rag-to-s3.ts --start-ingestion
        env:
          RAG_CONTENT_BUCKET: ${{ steps.rag-outputs.outputs.rag_bucket }}
          KB_ID: ${{ steps.rag-outputs.outputs.kb_id }}
          DATA_SOURCE_ID: ${{ steps.rag-outputs.outputs.data_source_id }}
